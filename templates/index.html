<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Video Pipeline</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #8b949e; margin-bottom: 2rem; }

        /* Upload area */
        .upload-zone {
            border: 2px dashed #30363d;
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2rem;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.05);
        }
        .upload-zone h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
        .upload-zone p { color: #8b949e; font-size: 0.9rem; }
        .upload-zone input { display: none; }
        .upload-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.7rem 2rem;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
        }
        .upload-btn:hover { background: #2ea043; }
        .upload-btn:disabled { background: #21262d; cursor: not-allowed; }

        /* Jobs list */
        .jobs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .job-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.2rem;
            margin-bottom: 1rem;
        }
        .job-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        .job-name { font-weight: 600; }
        .job-id { color: #8b949e; font-size: 0.8rem; }

        /* Status badges */
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .badge-queued { background: #21262d; color: #8b949e; }
        .badge-transcribing { background: #0d1d31; color: #58a6ff; }
        .badge-cleaning { background: #1c1d2e; color: #bc8cff; }
        .badge-synthesizing { background: #1b2a1b; color: #56d364; }
        .badge-complete { background: #1b2a1b; color: #3fb950; }
        .badge-error { background: #2d1117; color: #f85149; }

        /* Progress steps */
        .steps {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }
        .step {
            flex: 1;
            height: 4px;
            background: #21262d;
            border-radius: 2px;
            transition: background 0.3s;
        }
        .step.done { background: #3fb950; }
        .step.active { background: #58a6ff; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Output section */
        .outputs { margin-top: 0.5rem; }
        .output-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.4rem;
            font-size: 0.85rem;
        }
        .output-label { color: #8b949e; min-width: 80px; }
        .output-link {
            color: #58a6ff;
            text-decoration: none;
        }
        .output-link:hover { text-decoration: underline; }

        /* Script preview */
        .script-preview {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 1rem;
            margin-top: 0.8rem;
            font-size: 0.85rem;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .error-msg {
            color: #f85149;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Poker Video Pipeline</h1>
        <p class="subtitle">Upload audio, get a polished script + AI voice</p>

        <div class="upload-zone" id="dropZone">
            <h2>Drop audio file here</h2>
            <p>MP3, WAV, M4A, OGG, FLAC, WEBM (max 500MB)</p>
            <input type="file" id="fileInput" accept=".mp3,.wav,.m4a,.ogg,.flac,.webm">
            <br>
            <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">
                Choose File
            </button>
        </div>

        <div class="jobs-header">
            <h2>Jobs</h2>
        </div>
        <div id="jobsList"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const jobsList = document.getElementById('jobsList');

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) uploadFile(fileInput.files[0]);
        });

        async function uploadFile(file) {
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.error) {
                    alert(data.error);
                } else {
                    pollJob(data.job_id);
                }
            } catch (err) {
                alert('Upload failed: ' + err.message);
            }

            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Choose File';
            fileInput.value = '';
        }

        const statusSteps = {
            'queued': 0,
            'transcribing': 1,
            'cleaning': 2,
            'synthesizing': 3,
            'complete': 4,
            'error': -1
        };

        function renderJob(job) {
            const stepNum = statusSteps[job.status] || 0;
            const stepLabels = ['Queued', 'Transcribing', 'Cleaning Script', 'Voice Synthesis'];

            let stepsHtml = '';
            for (let i = 1; i <= 4; i++) {
                let cls = 'step';
                if (i < stepNum) cls += ' done';
                else if (i === stepNum && job.status !== 'complete') cls += ' active';
                else if (job.status === 'complete') cls += ' done';
                stepsHtml += `<div class="${cls}"></div>`;
            }

            let outputsHtml = '';
            if (job.transcript) {
                const fname = job.transcript.split(/[/\\]/).pop();
                outputsHtml += `<div class="output-row">
                    <span class="output-label">Transcript</span>
                    <a class="output-link" href="/download/transcripts/${fname}">${fname}</a>
                </div>`;
            }
            if (job.script) {
                const fname = job.script.split(/[/\\]/).pop();
                outputsHtml += `<div class="output-row">
                    <span class="output-label">Script</span>
                    <a class="output-link" href="/download/scripts/${fname}">${fname}</a>
                </div>`;
            }
            if (job.voice_filename) {
                outputsHtml += `<div class="output-row">
                    <span class="output-label">Voice</span>
                    <a class="output-link" href="/download/voice/${job.voice_filename}">${job.voice_filename}</a>
                </div>`;
            }

            let scriptPreview = '';
            if (job.script_text) {
                const preview = job.script_text.substring(0, 500) + (job.script_text.length > 500 ? '...' : '');
                scriptPreview = `<div class="script-preview">${escapeHtml(preview)}</div>`;
            }

            let errorHtml = '';
            if (job.error) errorHtml = `<div class="error-msg">Error: ${escapeHtml(job.error)}</div>`;
            if (job.voice_error) errorHtml += `<div class="error-msg">Voice error: ${escapeHtml(job.voice_error)}</div>`;

            return `<div class="job-card" id="job-${job.id}">
                <div class="job-top">
                    <div>
                        <span class="job-name">${escapeHtml(job.filename)}</span>
                        <span class="job-id">#${job.id}</span>
                    </div>
                    <span class="badge badge-${job.status}">${job.status}</span>
                </div>
                <div class="steps">${stepsHtml}</div>
                <div class="outputs">${outputsHtml}</div>
                ${scriptPreview}
                ${errorHtml}
            </div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function pollJob(jobId) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/status/${jobId}`);
                    const job = await res.json();

                    const existing = document.getElementById(`job-${jobId}`);
                    if (existing) {
                        existing.outerHTML = renderJob(job);
                    } else {
                        jobsList.insertAdjacentHTML('afterbegin', renderJob(job));
                    }

                    if (job.status === 'complete' || job.status === 'error') {
                        clearInterval(interval);
                    }
                } catch (err) {
                    clearInterval(interval);
                }
            }, 2000);

            // Show immediately
            jobsList.insertAdjacentHTML('afterbegin', renderJob({
                id: jobId, filename: '...', status: 'queued'
            }));
        }

        // Load existing jobs on page load
        async function loadJobs() {
            try {
                const res = await fetch('/jobs');
                const allJobs = await res.json();
                allJobs.reverse().forEach(job => {
                    jobsList.insertAdjacentHTML('beforeend', renderJob(job));
                    if (job.status !== 'complete' && job.status !== 'error') {
                        pollJob(job.id);
                    }
                });
            } catch (err) {}
        }
        loadJobs();
    </script>
</body>
</html>
